<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeAlpha SocialMedia | Profile</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body data-page="profile">
    <div id="navbar-root"></div>

    <main class="section">
      <div class="container profile-layout">
        <section class="profile-card" id="my-profile-root">
          Loading profile...
        </section>

        <aside class="side-panel">
          <div class="panel-card">
            <h3>Edit profile</h3>
            <form id="profile-form" class="stack">
              <label>
                Name
                <input type="text" name="name" placeholder="Your display name" />
              </label>
              <label>
                Profile image URL
                <input type="url" name="profilePic" placeholder="https://example.com/profile.jpg" />
              </label>
              <label>
                Bio
                <textarea name="bio" rows="4" placeholder="Tell people about yourself"></textarea>
              </label>
              <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
          </div>

          <div class="panel-card">
            <h3>Notifications</h3>
            <div id="notifications-root" class="stack compact"></div>
          </div>
        </aside>
      </div>
    </main>

    <div id="footer-root"></div>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
